# prometheus.yaml
global:
  scrape_interval: 5s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - "127.0.0.1:9090"

  - job_name: vllm-prefill
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/vllm-prefill.yml
        refresh_interval: 5s

  - job_name: vllm-decode
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/vllm-decode.yml
        refresh_interval: 5s

  - job_name: mooncake-master
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/mooncake-master.yml
        refresh_interval: 5s
