          # 确保 decode 节点上都有下面这些 ib port
          - name: MOONCAKE_DEVICE
            value: "mlx5_10,mlx5_11,mlx5_12,mlx5_13,mlx5_14,mlx5_15,mlx5_16,mlx5_17"
          - name: MC_ENABLE_DEST_DEVICE_AFFINITY
            value: "1"
          image: sglang:0314
          imagePullPolicy: IfNotPresent
          securityContext:
                privileged: true
                capabilities:
                  add: [ "IPC_LOCK", "SYS_RESOURCE" ]
          name: store-numa1
          ports:
            - containerPort: 8100
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "nc -z 127.0.0.1 8100"
            periodSeconds: 10
            failureThreshold: 90
          livenessProbe:
